name: Adam Smasher Bot
on:
  schedule:
    - cron: '0 12 * * *'   # Every day at 12:00 UTC (~once/day; adjust as needed, e.g. '0 */6 * * *' for every 6 hours)
  workflow_dispatch:       # Lets you test manually from GitHub UI
jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: pip install tweepy groq
    - name: Run bot
      env:
        X_API_KEY: ${{ secrets.X_API_KEY }}
        X_API_SECRET: ${{ secrets.X_API_SECRET }}
        X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
        X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: adamsmasher.py