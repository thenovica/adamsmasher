name: Adam Smasher Bot

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install dependencies (force modern google-genai)
      run: |
        pip install --upgrade pip setuptools wheel
        pip uninstall -y google-generativeai || true  # remove legacy if present
        pip install tweepy google-genai --no-cache-dir  # fresh install, no cache

    - name: Debug - show installed packages
      run: pip list | grep -i 'google\|genai\|tweepy\|protobuf'

    - name: Run bot
      env:
        X_API_KEY: ${{ secrets.X_API_KEY }}
        X_API_SECRET: ${{ secrets.X_API_SECRET }}
        X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
        X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python smasher.py
